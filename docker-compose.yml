services:
  x-backend: &backend
    build:
      context: .
      dockerfile: Dockerfile
      target: base
      args:
        RUBY_VERSION: "3.4.4"
        PG_MAJOR: "17"
    environment: &backend_environment
      RAILS_ENV: ${RAILS_ENV:-development}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_HOST: ${DB_HOST:-db} # local: "db" vía red infra. homelab: host.docker.internal
      DB_NAME_PREFIX: ${DB_NAME_PREFIX:-pro_rails}
      RAILS_MAX_THREADS: 5
      MAILER_ADDRESS: "maildev"
      MAILER_PORT: ${MAILDEV_SMTP_PORT:-1025}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      ANYCABLE_CABLE_URL: ws://localhost:${WS_PORT:-8080}/cable
      ANYCABLE_SECRET: ${ANYCABLE_SECRET:-anycable_key}
      CHROME_URL: ${CHROME_URL:-http://chrome:${CHROME_PORT:-3333}}
      HISTFILE: /usr/local/hist/.bash_history
      IRB_HISTFILE: /usr/local/hist/.irb_history
      PSQL_HISTFILE: /usr/local/hist/.psql_history
      EDITOR: vi
    volumes:
      - .:/pro-rails
      - pro-rails-cache:/pro-rails/tmp/cache
      - pro-rails-bundle:/usr/local/bundle
      - pro-rails-builds:/pro-rails/app/assets/builds
      - pro-rails-assets:/app/public/assets
      - pro-rails-storage:/pro-rails/storage
      - pro-rails-history:/usr/local/hist
    tmpfs:
      - /tmp:exec
      - /app/tmp/pids
    networks:
      - default
      - infra # se conecta a la red global para ver db y redis
    depends_on: &backend_depends_on
      ws:
        condition: service_started

  jobs:
    <<: *backend
    command: /bin/bash -c "bin/jobs start"
    environment:
      <<: *backend_environment
      RAILS_LOG_TO_STDOUT: "true"
    tty: true

  rails:
    <<: *backend
    command: /bin/bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    environment:
      <<: *backend_environment
      ANYCABLE_RPC_HOST: 0.0.0.0:50051
      ANYCABLE_DEBUG: "1"
      ANYCABLE_LOG_LEVEL: "debug"
    ports:
      - "${RAILS_PORT:-3000}:3000"
      - "50051" # sin binding al host — solo interno
    tty: true
    depends_on:
      <<: *backend_depends_on
      maildev:
        condition: service_started
      jobs:
        condition: service_started

  ws:
    image: anycable/anycable-go:1.6.3-alpine
    ports:
      - "${WS_PORT:-8080}:8080"
      - "${WS_BROADCAST_PORT:-8090}:8090"
    environment:
      ANYCABLE_HOST: "0.0.0.0"
      ANYCABLE_PORT: 8080
      ANYCABLE_REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      ANYCABLE_RPC_HOST: rails:50051
      ANYCABLE_DEBUG: true
      ANYCABLE_TURBO_STREAMS: true
      ANYCABLE_SECRET: ${ANYCABLE_SECRET:-anycable_key}
      ANYCABLE_JWT_ID_KEY: ${ANYCABLE_JWT_ID_KEY:-anycable_key}
      ANYCABLE_BROADCAST_ADAPTER: "redisx"
      ANYCABLE_BROKER: "memory"
      ANYCABLE_REDIS_CHANNEL: __anycable__
    networks:
      - default
      - infra

  maildev:
    image: maildev/maildev
    restart: always
    environment:
      MAILDEV_SMTP_PORT: 1025
      MAILDEV_WEB_PORT: 8025
      MAILDEV_MAIL_DIRECTORY: /home/node/data
    volumes:
      - pro-rails-mc-data:/home/node
    ports:
      - "${MAILDEV_SMTP_PORT:-1025}:1025"
      - "${MAILDEV_WEB_PORT:-8025}:8025"

  chrome:
    image: browserless/chrome:latest
    ports:
      - "${CHROME_PORT:-3333}:3333"
    volumes:
      - .:/rails-app
    environment:
      PORT: 3333
      CONNECTION_TIMEOUT: 600000
      MAX_CONCURRENT_SESSIONS: 1
      QUEUE_LENGTH: 2
      PREBOOT_CHROME: "true"
      KEEP_ALIVE: "true"

  test_system:
    <<: *backend
    command: rspec spec/system
    ports:
      - "3001:3001"
      - "50051"
    environment:
      <<: *backend_environment
      RAILS_ENV: test
      APP_HOST: ${APP_HOST:-anycable.test}
      ANYCABLE_RPC_HOST: 0.0.0.0:50051
      ANYCABLE_HTTP_BROADCAST_URL: http://ws.anycable.test:8090/_broadcast
      ANYCABLE_WEBSOCKET_URL: ${ANYCABLE_WEBSOCKET_URL:-ws://ws.anycable.test:8081/cable}
    depends_on:
      <<: *backend_depends_on
      chrome:
        condition: service_started
      ws_test:
        condition: service_started
    networks:
      default:
        aliases:
          - anycable.test
      infra: {}

  ws_test:
    image: anycable/anycable-go:1.6.3-alpine
    ports:
      - "8081:8081" # puerto fijo — test_system solo corre en un worktree a la vez
    environment:
      ANYCABLE_HOST: "0.0.0.0"
      ANYCABLE_PORT: "8081"
      ANYCABLE_REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      ANYCABLE_BROKER: ""
      ANYCABLE_RPC_HOST: anycable.test:50051
      ANYCABLE_SECRET: ${ANYCABLE_SECRET:-anycable_key}
      ANYCABLE_JWT_ID_KEY: ${ANYCABLE_JWT_ID_KEY:-anycable_key}
      ANYCABLE_BROADCAST_ADAPTER: "redisx"
      ANYCABLE_TURBO_STREAMS: true
      ANYCABLE_REDIS_CHANNEL: __anycable__
    networks:
      default:
        aliases:
          - ws.anycable.test
      infra: {}

networks:
  default: {}
  infra:
    external: true
    name: pro-rails-infra # se conecta a la red del infra compose

volumes:
  pro-rails-bundle:
  pro-rails-cache:
  pro-rails-builds:
  pro-rails-assets:
  pro-rails-storage:
  pro-rails-history:
  pro-rails-mc-data:
  # Nota: pro-rails-postgres-db y pro-rails-redis NO están acá,
  # pertenecen al infra compose y tienen nombres fijos.
